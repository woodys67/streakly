<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streakly – Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #212121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      width: 64px; height: 64px;
      background: #FF8C00;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
    }
    h1 { font-size: 28px; font-weight: 800; color: #FF8C00; margin-bottom: 8px; }
    p.sub { font-size: 14px; color: #757575; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 560px;
    }
    a.card {
      background: #fff;
      border-radius: 16px;
      border: 1.5px solid #e0e0e0;
      padding: 24px 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a.card:hover {
      border-color: #FF8C00;
      box-shadow: 0 4px 16px rgba(255,140,0,0.12);
    }
    .card-icon { font-size: 28px; margin-bottom: 10px; }
    .card-lang {
      font-size: 11px; font-weight: 700;
      color: #FF8C00; letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .card-title { font-size: 15px; font-weight: 700; color: #212121; }
    footer {
      margin-top: 48px;
      font-size: 12px;
      color: #bbb;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="logo">🔥</div>
  <h1>Streakly</h1>
  <p class="sub">Legal Documents</p>

  <div class="grid">
    <a class="card" href="privacy_policy.html">
      <div class="card-icon">🔐</div>
      <div class="card-lang">한국어</div>
      <div class="card-title">개인정보처리방침</div>
    </a>
    <a class="card" href="privacy_policy_en.html">
      <div class="card-icon">🔐</div>
      <div class="card-lang">ENGLISH</div>
      <div class="card-title">Privacy Policy</div>
    </a>
    <a class="card" href="terms_of_service.html">
      <div class="card-icon">📋</div>
      <div class="card-lang">한국어</div>
      <div class="card-title">이용약관</div>
    </a>
    <a class="card" href="terms_of_service_en.html">
      <div class="card-icon">📋</div>
      <div class="card-lang">ENGLISH</div>
      <div class="card-title">Terms of Service</div>
    </a>
  </div>

  <footer>© 2026 Streakly · hello@dotone.kr</footer>
</body>
</html>
