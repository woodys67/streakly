name: streakly
description: "21-day habit formation and challenge management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.20.1
  uuid: ^4.5.1
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  sign_in_with_apple: ^6.1.3
  google_sign_in: ^6.2.2
  crypto: ^3.0.3
  flutter_markdown: ^0.7.7
  app_settings: ^7.0.0
  url_launcher: ^6.3.2
  google_mobile_ads: ^8.0.0
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/flame.png
    - assets/images/avatar_flame.png
    - assets/images/avatar_bolt.png
    - assets/images/avatar_trophy.png
    - assets/images/avatar_target.png
    - assets/images/avatar_diamond.png
    - assets/images/avatar_rocket.png
    - assets/images/avatar_crown.png
    - assets/images/avatar_leaf.png
    - assets/images/avatar_star.png
    - assets/images/avatar_mountain.png
    - assets/images/logo_apple.png
    - assets/images/logo_google.png
    - assets/images/badges/
